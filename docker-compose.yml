services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: llanos-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
    # Leemos las variables del archivo .env.local de desarrollo
    env_file:
      - .env.local
